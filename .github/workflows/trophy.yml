name: Generate Arcade Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository with PAT
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.USER_NAME }}"
          git config --global user.email "${{ secrets.USER_EMAIL }}"

      - name: Generate Pacman Contribution Graph
        uses: abhisheknaiidu/pacman-contribution-graph@main
        with:
          github_user_name: "Xyraakyzzz"

      - name: Prepare output
        run: |
          mkdir -p pacman-output

          OUTPUT="pacman-output/Xyraakyzzz-trophy.svg"

          if [ -f "pacman-contribution-graph.svg" ]; then
            cp pacman-contribution-graph.svg "$OUTPUT"
          elif [ -f "dist/pacman-contribution-graph.svg" ]; then
            cp dist/pacman-contribution-graph.svg "$OUTPUT"
          else
            SVG=$(find . -type f -name "*.svg" | head -n 1)
            if [ -n "$SVG" ]; then
              cp "$SVG" "$OUTPUT"
            else
              cat > "$OUTPUT" <<EOF
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120">
  <rect width="100%" height="100%" fill="#0d1117"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#58a6ff" font-size="28" font-family="Arial">
    Xyraakyzzz Trophy
  </text>
</svg>
EOF
            fi
          fi

          ls -lah pacman-output

      - name: Push to pacman-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: pacman-output
          commit_message: "🎮 chore: generate pacman contribution graph"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
