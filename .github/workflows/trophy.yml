name: Generate Trophy Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate Pacman Contribution Graph
        uses: abhisheknaiidu/pacman-contribution-graph@main
        with:
          github_user_name: Xyraakyzzz

      - name: Prepare output
        run: |
          mkdir -p pacman-output

          SVG=$(find . -type f -name "pacman-contribution-graph.svg" | head -n 1)

          if [ -n "$SVG" ] && [ -f "$SVG" ]; then
            cp "$SVG" pacman-output/pacman-contribution-graph.svg
            echo "✅ Generated SVG found."
          else
            echo "⚠️ SVG not found. Creating placeholder..."

            cat > pacman-output/pacman-contribution-graph.svg <<'EOF'
            <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300">
              <rect width="1200" height="300" fill="#0d1117"/>
              <text x="600" y="140"
                    text-anchor="middle"
                    font-family="Arial, Helvetica, sans-serif"
                    font-size="32"
                    fill="#58a6ff">
                Pacman Contribution Graph
              </text>
              <text x="600" y="185"
                    text-anchor="middle"
                    font-family="Arial, Helvetica, sans-serif"
                    font-size="20"
                    fill="#8b949e">
                Waiting for first successful generation...
              </text>
            </svg>
            EOF

            echo "✅ Placeholder SVG created."
          fi

          ls -lah pacman-output

      - name: Push to pacman-output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: pacman-output
          build_dir: pacman-output
          commit_message: "🎮 chore: generate pacman contribution graph"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
