name: GitHub Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"  # update tiap hari jam 00:00 UTC
  workflow_dispatch:     # bisa dijalankan manual juga

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # Generate Snake
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: Xyraakyzzz
          # Optional: ubah theme kalau mau
          theme: tokyonight
          outputs: |
            dist/github-con

      # Commit dan push hasil ke branch yang sama
      - name: Commit Snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/github-contribution-grid-snake.svg
          git commit -m "Update Contribution Snake [skip ci]" || echo "No changes to commit"
          git push
