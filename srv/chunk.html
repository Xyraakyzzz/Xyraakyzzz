<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realtime Contributions SVG</title>
<style>
@keyframes currstreak {
    0% { font-size: 3px; opacity: 0.2; }
    80% { font-size: 34px; opacity: 1; }
    100% { font-size: 28px; opacity: 1; }
}
@keyframes fadein {
    0% { opacity: 0; }
    100% { opacity: 1; }
}
.heart path:last-child {
    animation: fireGlow 1s infinite alternate;
}
@keyframes fireGlow {
    0% {
        fill: #ff3300;
        filter: drop-shadow(0 0 4px #ff4500);
        transform: scale(1) translateY(0);
    }
    40% {
        fill: #ff6600;
        filter: drop-shadow(0 0 10px #ff9900);
        transform: scale(1.05) translateY(-2px);
    }
    80% {
        fill: #ff6600;
        filter: drop-shadow(0 0 10px #ff8800);
        transform: scale(1.05) translateY(-1px);
    }
    100% {
        fill: #ff3300;
        filter: drop-shadow(0 0 6px #ff4400);
        transform: scale(1) translateY(0);
    }
}
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     style="isolation: isolate" viewBox="0 0 495 195" width="495px" height="195px" direction="ltr">
    <defs>
        <clipPath id="outer_rectangle">
            <rect width="495" height="195" rx="4.5"/>
        </clipPath>
        <mask id="mask_out_ring_behind_fire">
            <rect width="495" height="195" fill="white"/>
            <ellipse cx="247.5" cy="32" rx="13" ry="18" fill="black"/>
        </mask>
    </defs>
    <g clip-path="url(#outer_rectangle)">
        <rect stroke="#E4E2E2" fill="#FFFEFE" rx="4.5" x="0.5" y="0.5" width="494" height="194"/>
        <line x1="165" y1="28" x2="165" y2="170" vector-effect="non-scaling-stroke" stroke-width="1" stroke="#E4E2E2" stroke-linejoin="miter" stroke-linecap="square" stroke-miterlimit="3"/>
        <line x1="330" y1="28" x2="330" y2="170" vector-effect="non-scaling-stroke" stroke-width="1" stroke="#E4E2E2" stroke-linejoin="miter" stroke-linecap="square" stroke-miterlimit="3"/>
    </g>
    <g transform="translate(82.5, 48)">
        <text id="totalContrib" x="0" y="32" stroke-width="0" text-anchor="middle" fill="#151515" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="700" font-size="28px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 0.6s">0</text>
    </g>
    <g transform="translate(82.5, 84)">
        <text x="0" y="32" stroke-width="0" text-anchor="middle" fill="#FF0000" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="400" font-size="14px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 0.7s">Total Contributions</text>
    </g>
    <g transform="translate(82.5, 114)">
        <text id="contribRange" x="0" y="32" stroke-width="0" text-anchor="middle" fill="#464646" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="400" font-size="12px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 0.8s"></text>
    </g>
    <g transform="translate(247.5, 108)">
        <text x="0" y="32" stroke-width="0" text-anchor="middle" fill="#FF0000" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="700" font-size="14px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 0.9s">Current Streak</text>
    </g>
    <g transform="translate(247.5, 145)">
        <text id="currentStreakDate" x="0" y="21" stroke-width="0" text-anchor="middle" fill="#464646" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="400" font-size="12px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 0.9s"></text>
    </g>
    <g mask="url(#mask_out_ring_behind_fire)">
        <circle cx="247.5" cy="71" r="40" fill="none" stroke="#FF0000" stroke-width="5" style="opacity: 0; animation: fadein 0.5s linear forwards 0.4s"></circle>
    </g>
    <g transform="translate(247.5, 19.5)" stroke-opacity="0" style="opacity: 0; animation: fadein 0.5s linear forwards 0.6s" class="heart">
        <path d="M -12 -0.5 L 15 -0.5 L 15 23.5 L -12 23.5 L -12 -0.5 Z" fill="none"/>
        <path d="M 1.5 0.67 C 1.5 0.67 2.24 3.32 2.24 5.47 C 2.24 7.53 0.89 9.2 -1.17 9.2 C -3.23 9.2 -4.79 7.53 -4.79 5.47 L -4.76 5.11 C -6.78 7.51 -8 10.62 -8 13.99 C -8 18.41 -4.42 22 0 22 C 4.42 22 8 18.41 8 13.99 C 8 8.6 5.41 3.79 1.5 0.67 Z M -0.29 19 C -2.07 19 -3.51 17.6 -3.51 15.86 C -3.51 14.24 -2.46 13.1 -0.7 12.74 C 1.07 12.38 2.9 11.53 3.92 10.16 C 4.31 11.45 4.51 12.81 4.51 14.2 C 4.51 16.85 2.36 19 -0.29 19 Z" fill="#FF0000" stroke-opacity="0"/>
    </g>
    <g transform="translate(247.5, 48)">
        <text id="currentStreakNum" x="0" y="32" stroke-width="0" text-anchor="middle" fill="#FF0000" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="700" font-size="28px" font-style="normal" style="animation: currstreak 0.6s linear forwards">999+</text>
    </g>
    <g transform="translate(412.5, 48)">
        <text id="longestStreakNum" x="0" y="32" stroke-width="0" text-anchor="middle" fill="#151515" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="700" font-size="28px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 1.2s">999+</text>
    </g>
    <g transform="translate(412.5, 84)">
        <text x="0" y="32" stroke-width="0" text-anchor="middle" fill="#FF0000" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="400" font-size="14px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 1.3s">Longest Streak</text>
    </g>
    <g transform="translate(412.5, 114)">
        <text id="longestStreakRange" x="0" y="32" stroke-width="0" text-anchor="middle" fill="#464646" stroke="none" font-family='"Segoe UI", Ubuntu, sans-serif' font-weight="400" font-size="12px" font-style="normal" style="opacity: 0; animation: fadein 0.5s linear forwards 1.4s"></text>
    </g>
</svg>
<script>
const username = "Xyraakyzzz";
async function fetchContrib() {
    const now = new Date();
    const month = now.getMonth() + 1;
    const year = now.getFullYear();
    const res = await fetch(`https://api.github.com/users/${username}/events`);
    const data = await res.json();
    let monthly = 0;
    data.forEach(e => {
        const d = new Date(e.created_at);
        if(d.getFullYear() === year && d.getMonth()+1 === month) monthly++;
    });
    document.getElementById("totalContrib").textContent = monthly.toLocaleString();
    document.getElementById("contribRange").textContent = now.toLocaleString('default', { month: 'short' }) + " 1, " + year + " - Present";
    document.getElementById("currentStreakNum").textContent = "999+";
    document.getElementById("currentStreakDate").textContent = now.toDateString();
    document.getElementById("longestStreakNum").textContent = "999+";
    document.getElementById("longestStreakRange").textContent = now.toDateString();
}
fetchContrib();
</script>
</body>
</html>
